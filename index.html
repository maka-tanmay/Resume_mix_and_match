        const SetupSupabasePanel = ({ onConfigSaved }) => {

            const [rawConfig, setRawConfig] = useState('');

                e.preventDefault();
                try {
                    // Extract JSON or object configuration from string
                    let cleanString = rawConfig.trim();
                    // If they pasted a JS object instead of pure JSON, convert it
                    if (cleanString.startsWith('const') || cleanString.includes('firebaseConfig =')) {
                        const match = cleanString.match(/firebaseConfig\s*=\s*({[\s\S]*?});/);
                        if (match && match[1]) {
                            cleanString = match[1];
                        }
                    }
                    // Replace unquoted keys with quoted keys for JS object parsing
                    const parsedConfig = new Function(`return ${cleanString}`)();
                    if (!parsedConfig.apiKey || !parsedConfig.projectId) {
                        throw new Error("Missing apiKey or projectId in config.");
                    }
                    onConfigSaved(parsedConfig);
                } catch (err) {
                    setError('Invalid Firebase Configuration format. Make sure you copy and paste the firebaseConfig object.');
                }

            }

            // Fetch Data from Firestore
            useEffect(() => {
                const loadData = async () => {
                    try {
                        const doc = await docRef.get();
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.personalInfo) setPersonalInfo(data.personalInfo);
                            if (data.jobs) setJobs(data.jobs);
                            if (data.jobs) setExpandedJobs(data.jobs.map(j => j.id));

                        }
                    } catch (error) {
                        console.error("Error loading document:", error);
                        setSyncStatus('error');
                    } finally {
                        initialLoad.current = false;
                    }

                loadData();
            }, [user.uid]);

            // Save Data to Firestore on Change

                setSyncStatus('saving');

                    try {
                        await docRef.set({ personalInfo, jobs });
                        setSyncStatus('synced');
                    } catch (error) {
                        console.error("Error saving document:", error);
                        setSyncStatus('error');
                    }

                setDraggedJobId(id);
                setTimeout(() => {
                    e.target.style.opacity = '0.5';
                }, 0);
            };

            const handleDragEnd = (e) => {
                e.target.style.opacity = '1';
                setDraggedJobId(null);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
            };

            const handleDrop = (e, targetId) => {
                e.preventDefault();
                if (!draggedJobId || draggedJobId === targetId) return;

                const draggedIndex = jobs.findIndex(j => j.id === draggedJobId);
                const targetIndex = jobs.findIndex(j => j.id === targetId);

                const newJobs = [...jobs];
                const [draggedItem] = newJobs.splice(draggedIndex, 1);
                newJobs.splice(targetIndex, 0, draggedItem);

                setJobs(newJobs);
            };

            // Add Job
            const handleAddJobSubmit = (e) => {
                e.preventDefault();
                const newId = 'job-' + Date.now();
                const vId = 'v1-' + Date.now();
                const createdJob = {
                    id: newId,
                    company: newJob.company,
                    title: newJob.title,
                    duration: newJob.duration,
                    included: true,
                    selectedVariantId: vId,
                    variants: [
                        { id: vId, label: 'Default', bullets: newJob.bullets }
                    ]
                };
                setJobs([createdJob, ...jobs]);
                setExpandedJobs([...expandedJobs, newId]);
                setIsAddingJob(false);
                setNewJob({ company: '', title: '', duration: '', bullets: '' });
            };

            // Add Variant
            const handleAddVariantSubmit = (e, jobId) => {
                e.preventDefault();
                const newVId = 'v-' + Date.now();
                const addedVariant = { id: newVId, label: newVariant.label, bullets: newVariant.bullets };
                setJobs(jobs.map(j => {
                    if (j.id === jobId) {
                        return { ...j, variants: [...j.variants, addedVariant], selectedVariantId: newVId };
                    }
                    return j;
                }));
                setAddingVariantToId(null);
                setNewVariant({ label: '', bullets: '' });
            };

            // Export LaTeX
            const handleCopyLatex = () => {
                const selectedJobs = jobs.filter(j => j.included);
                const latexStr = generateLatex(personalInfo, selectedJobs);
                navigator.clipboard.writeText(latexStr).then(() => {
                    alert("LaTeX copied to clipboard!");
                }).catch(err => {
                    alert("Failed to copy LaTeX: " + err);
                });
            };

            const selectedJobs = jobs.filter(j => j.included);

            return (
                <div className="flex h-screen w-full bg-app-bg text-app-text overflow-hidden">
                    
                    {/* LEFT SIDEBAR */}
                    <div className="w-[450px] flex flex-col border-r border-app-border h-full bg-[#0a0a0a]">
                        <div className="p-6 pb-4 border-b border-app-border flex justify-between items-center bg-[#0a0a0a] z-10">
                            <div>
                                <h1 className="text-2xl font-bold tracking-tight text-white">Experience Library</h1>
                                <p className="text-sm text-app-textMuted mt-1">Mix and match job history</p>
                            </div>
                            <button 
                                onClick={() => setIsAddingJob(!isAddingJob)}
                                className="w-10 h-10 rounded-full bg-app-card hover:bg-app-cardHover flex items-center justify-center transition-colors border border-app-border shadow-sm"
                            >
                                <IconPlus />
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-6 space-y-4">
                            
                            {/* Add Job Form */}
                            {isAddingJob && (
                                <div className="bg-app-card border border-app-border p-4 rounded-2xl animate-[fadeIn_0.2s_ease-out]">
                                    <h3 className="font-semibold text-lg mb-3">Add Experience</h3>
                                    <form onSubmit={handleAddJobSubmit} className="space-y-3">
                                        <input required placeholder="Company Name" className="w-full bg-[#0a0a0a] border border-app-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-app-textMuted" value={newJob.company} onChange={e => setNewJob({...newJob, company: e.target.value})} />
                                        <input required placeholder="Job Title" className="w-full bg-[#0a0a0a] border border-app-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-app-textMuted" value={newJob.title} onChange={e => setNewJob({...newJob, title: e.target.value})} />
                                        <input required placeholder="Duration (e.g. Jan 2021 - Mar 2023)" className="w-full bg-[#0a0a0a] border border-app-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-app-textMuted" value={newJob.duration} onChange={e => setNewJob({...newJob, duration: e.target.value})} />
                                        <textarea required placeholder="Bullet points (one per line)" className="w-full bg-[#0a0a0a] border border-app-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-app-textMuted h-24" value={newJob.bullets} onChange={e => setNewJob({...newJob, bullets: e.target.value})} />
                                        <div className="flex justify-end space-x-2 pt-2">
                                            <button type="button" onClick={() => setIsAddingJob(false)} className="px-4 py-2 text-sm rounded-lg hover:bg-[#38383a]">Cancel</button>
                                            <button type="submit" className="px-4 py-2 text-sm rounded-lg bg-white text-black font-medium hover:bg-gray-200">Save</button>
                                        </div>
                                    </form>
                                </div>
                            )}

                            {/* Job List */}
                            {jobs.map(job => {
                                const isExpanded = expandedJobs.includes(job.id);
                                const activeVariant = job.variants.find(v => v.id === job.selectedVariantId);
                                const firstBullet = activeVariant ? activeVariant.bullets.split('\n')[0] : '';
                                
                                return (
                                    <div 
                                        key={job.id} 
                                        draggable
                                        onDragStart={(e) => handleDragStart(e, job.id)}
                                        onDragEnd={handleDragEnd}
                                        onDragOver={handleDragOver}
                                        onDrop={(e) => handleDrop(e, job.id)}
                                        className={`bg-app-card border rounded-2xl transition-all duration-200 ${job.included ? 'border-app-accent/50 shadow-md' : 'border-app-border opacity-70'} ${draggedJobId === job.id ? 'opacity-50' : ''}`}
                                    >
                                        {/* Card Header */}
                                        <div className="p-4 flex items-start gap-3">
                                            <div className="mt-1 cursor-grab active:cursor-grabbing">
                                                <IconDrag />
                                            </div>
                                            <div className="pt-1">
                                                <input 
                                                    type="checkbox" 
                                                    checked={job.included} 
                                                    onChange={() => toggleJobInclusion(job.id)}
                                                    className="w-5 h-5 rounded accent-white border-app-border cursor-pointer"
                                                />
                                            </div>
                                            <div className="flex-1 cursor-pointer select-none" onClick={() => toggleJobExpansion(job.id)}>
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <h3 className={`font-semibold text-lg ${job.included ? 'text-white' : 'text-app-textMuted'}`}>{job.company}</h3>
                                                        <p className="text-sm text-app-textMuted">{job.title} &bull; {job.duration}</p>
                                                    </div>
                                                    <div className="text-app-textMuted">
                                                        {isExpanded ? <IconChevronUp /> : <IconChevronDown />}
                                                    </div>
                                                </div>
                                                {!isExpanded && activeVariant && (
                                                    <p className="text-sm text-app-textMuted mt-2 line-clamp-1 italic">
                                                        "{firstBullet}"
                                                    </p>
                                                )}
                                            </div>
                                        </div>

                                        {/* Card Expanded Content */}
                                        {isExpanded && (
                                            <div className="p-4 pt-0 border-t border-app-border/50 mt-2">
                                                <div className="mt-4 flex items-center justify-between">
                                                    <span className="text-xs font-semibold text-app-textMuted uppercase tracking-wider">Variants</span>
                                                    <button 
                                                        onClick={() => setAddingVariantToId(addingVariantToId === job.id ? null : job.id)}
                                                        className="text-xs flex items-center gap-1 text-app-text hover:text-white"
                                                    >
                                                        <IconPlus size={14} /> Add Variant
                                                    </button>
                                                </div>

                                                {/* Variant List */}
                                                <div className="mt-3 space-y-2">
                                                    {job.variants.map(variant => (
                                                        <div 
                                                            key={variant.id} 
                                                            onClick={() => selectVariant(job.id, variant.id)}
                                                            className={`p-3 rounded-xl border cursor-pointer transition-colors ${job.selectedVariantId === variant.id ? 'bg-[#2C2C2E] border-app-accent/30' : 'bg-[#0a0a0a] border-app-border hover:border-app-textMuted/50'}`}
                                                        >
                                                            <div className="flex items-center gap-2 mb-2">
                                                                <input 
                                                                    type="radio" 
                                                                    checked={job.selectedVariantId === variant.id} 
                                                                    onChange={() => selectVariant(job.id, variant.id)}
                                                                    className="accent-white cursor-pointer"
                                                                />
                                                                <span className="font-medium text-sm">{variant.label}</span>
                                                            </div>
                                                            <ul className="text-xs text-app-textMuted space-y-1 list-disc pl-5">
                                                                {variant.bullets.split('\n').map((bullet, i) => bullet.trim() && (
                                                                    <li key={i}>{bullet}</li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    ))}
                                                </div>

                                                {/* Add Variant Form */}
                                                {addingVariantToId === job.id && (
                                                    <form onSubmit={(e) => handleAddVariantSubmit(e, job.id)} className="mt-3 p-3 bg-[#0a0a0a] rounded-xl border border-app-border">
                                                        <input required placeholder="Variant Label (e.g. Backend Focus)" className="w-full bg-transparent border-b border-app-border px-2 py-1 mb-2 text-sm focus:outline-none" value={newVariant.label} onChange={e => setNewVariant({...newVariant, label: e.target.value})} />
                                                        <textarea required placeholder="Bullet points (one per line)" className="w-full bg-transparent border border-app-border rounded px-2 py-1 text-sm focus:outline-none h-20" value={newVariant.bullets} onChange={e => setNewVariant({...newVariant, bullets: e.target.value})} />
                                                        <div className="flex justify-end gap-2 mt-2">
                                                            <button type="button" onClick={() => setAddingVariantToId(null)} className="text-xs px-3 py-1 rounded hover:bg-[#38383a]">Cancel</button>
                                                            <button type="submit" className="text-xs px-3 py-1 rounded bg-white text-black font-medium hover:bg-gray-200">Save</button>
                                                        </div>
                                                    </form>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                        
                        {/* User Profile Bar */}
                        <div className="p-4 border-t border-app-border bg-[#0a0a0a] flex items-center justify-between">
                            <div className="flex flex-col truncate pr-2">
                                <span className="text-xs text-app-textMuted">Logged in as</span>
                                <span className="text-sm text-white truncate font-medium">{user.email}</span>
                            </div>
                            <button 
                                onClick={() => firebase.auth().signOut()} 
                                className="text-xs bg-[#1C1C1E] border border-app-border hover:bg-red-950 hover:text-red-300 hover:border-red-900/50 px-3 py-1.5 rounded-lg font-medium transition-colors"
                            >
                                Sign Out
                            </button>
                        </div>
                    </div>

                    {/* RIGHT PREVIEW PANEL */}
                    <div className="flex-1 flex flex-col bg-[#111111] relative">
                        {/* Upper Utility Header */}
                        <div className="absolute top-6 left-6 z-10 flex items-center gap-2 bg-[#1C1C1E] border border-app-border px-3 py-1.5 rounded-full text-xs">
                            {syncStatus === 'synced' && (
                                <>
                                    <IconCloudCheck />
                                    <span className="text-app-textMuted">Cloud Synced</span>
                                </>
                            )}
                            {syncStatus === 'saving' && (
                                <>
                                    <IconCloudSync />
                                    <span className="text-orange-400">Saving changes...</span>
                                </>
                            )}
                            {syncStatus === 'error' && (
                                <span className="text-red-500">Sync Error</span>
                            )}
                        </div>

                        <div className="absolute top-6 right-6 z-10 flex gap-3">
                            <button 
                                onClick={handleCopyLatex}
                                className="bg-app-card border border-app-border text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-app-cardHover shadow-lg flex items-center gap-2 transition-transform active:scale-95"
                            >
                                Copy as LaTeX
                            </button>
                        </div>
                        
                        {/* Live Resume Sheet container */}
                        <div className="flex-1 overflow-y-auto p-12 flex justify-center items-start">
                            {/* A4 Size Paper approx ratio */}
                            <div className="bg-white text-black w-full max-w-[850px] min-h-[1100px] shadow-2xl p-12 resume-preview relative">
                                
                                {/* Header (Editable) */}
                                <div className="text-center mb-6 border-b-2 border-black pb-4">
                                    <input 
                                        className="text-4xl font-bold uppercase w-full text-center outline-none bg-transparent hover:bg-gray-100 transition-colors" 
                                        value={personalInfo.name} 
                                        onChange={(e) => setPersonalInfo({...personalInfo, name: e.target.value})}
                                    />
                                    <div className="flex justify-center items-center gap-2 mt-2 text-sm resume-preview-sans">
                                        <input className="outline-none bg-transparent hover:bg-gray-100 text-center w-32" value={personalInfo.phone} onChange={(e) => setPersonalInfo({...personalInfo, phone: e.target.value})} />
                                        <span>|</span>
                                        <input className="outline-none bg-transparent hover:bg-gray-100 text-center w-48 text-blue-800 underline" value={personalInfo.email} onChange={(e) => setPersonalInfo({...personalInfo, email: e.target.value})} />
                                        <span>|</span>
                                        <input className="outline-none bg-transparent hover:bg-gray-100 text-center w-56 text-blue-800 underline" value={personalInfo.linkedin} onChange={(e) => setPersonalInfo({...personalInfo, linkedin: e.target.value})} />
                                    </div>
                                </div>

                                {/* Experience Section */}
                                <div>
                                    <h2 className="text-xl font-bold uppercase border-b border-black mb-3">Experience</h2>
                                    
                                    <div className="space-y-4">
                                        {selectedJobs.map(job => {
                                            const activeVariant = job.variants.find(v => v.id === job.selectedVariantId);
                                            const bullets = activeVariant ? activeVariant.bullets.split('\n') : [];

                                            return (
                                                <div key={'prev-'+job.id}>
                                                    <div className="flex justify-between items-end mb-1">
                                                        <h3 className="font-bold text-lg leading-tight">{job.company}</h3>
                                                        <span className="italic text-sm">{job.duration}</span>
                                                    </div>
                                                    <div className="flex justify-between items-start mb-1">
                                                        <p className="italic text-md">{job.title}</p>
                                                    </div>
                                                    <ul className="list-disc pl-5 resume-preview-sans text-sm space-y-1">
                                                        {bullets.map((bullet, i) => bullet.trim() && (
                                                            <li key={i}>{bullet}</li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            )
                                        })}
                                        
                                        {selectedJobs.length === 0 && (
                                            <p className="text-gray-500 italic text-center py-10">Select jobs from the sidebar to populate the resume.</p>
                                        )}
                                    </div>
                                </div>
                                
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        // --- Core Entry Component ---
        const App = () => {
            const [fbConfig, setFbConfig] = useState(() => {
                const saved = localStorage.getItem('firebase_config');
                return saved ? JSON.parse(saved) : null;
            });
            const [user, setUser] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);

            // Initialize Firebase if config is present
            useEffect(() => {
                if (fbConfig) {
                    try {
                        if (!firebase.apps.length) {
                            firebase.initializeApp(fbConfig);
                        }
                        const unsubscribe = firebase.auth().onAuthStateChanged(usr => {
                            setUser(usr);
                            setLoadingAuth(false);
                        });
                        return () => unsubscribe();
                    } catch (error) {
                        console.error("Firebase Initialization Error:", error);
                        // Config failed, clear it to let user re-enter
                        localStorage.removeItem('firebase_config');
                        setFbConfig(null);
                        setLoadingAuth(false);
                    }
                } else {
                    setLoadingAuth(false);
                }
            }, [fbConfig]);

            const handleConfigSaved = (config) => {
                localStorage.setItem('firebase_config', JSON.stringify(config));
                setFbConfig(config);
                setLoadingAuth(true); // Restart auth flow with new config
            };

            // Loading screen while verifying auth
            if (loadingAuth) {
                return (
                    <div className="min-h-screen bg-app-bg flex items-center justify-center">
                        <div className="text-center space-y-3">
                            <IconCloudSync />
                            <p className="text-sm text-app-textMuted">Initializing secure database...</p>
                        </div>
                    </div>
                );
            }

            // Stage 1: Firebase Config Input
            if (!fbConfig) {
                return <SetupFirebasePanel onConfigSaved={handleConfigSaved} />;
            }

            // Stage 2: User Authentication
            if (!user) {
                return <AuthPanel onAuthSuccess={(usr) => setUser(usr)} />;
            }

            // Stage 3: Authenticated App
            return <Dashboard user={user} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
